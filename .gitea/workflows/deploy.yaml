name: CI/CD Pipeline — Qurban Story
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Qurban Story
        run: |
          # Install SSH client tools
          if command -v apk >/dev/null; then
            apk add --no-cache openssh-client sshpass
          elif command -v apt-get >/dev/null; then
            apt-get update && apt-get install -y openssh-client sshpass
          fi

          export SSHPASS="${{ secrets.SSH_PASSWORD }}"
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
            
            echo "=== [CI/CD] Mulai deployment ==="
            cd /var/www/qurban-story

            echo "=== [CI/CD] Pull kode terbaru ==="
            git fetch --all
            git reset --hard origin/main

            echo "=== [CI/CD] Rebuild & restart containers ==="
            docker compose up -d --build

            echo "=== [CI/CD] Status akhir ==="
            docker compose ps

            echo "=== [CI/CD] Selesai ==="
          EOF