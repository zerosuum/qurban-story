version: '3.8'
services:
  app1:
    build:
      context: .
      args:
        NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${NEXT_PUBLIC_MIDTRANS_CLIENT_KEY}
    container_name: qurban_app_1
    ports:
      - "3001:3000"
    env_file:
      - .env
    restart: unless-stopped

  app2:
    build:
      context: .
      args:
        NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${NEXT_PUBLIC_MIDTRANS_CLIENT_KEY}
    container_name: qurban_app_2
    ports:
      - "3002:3000"
    env_file:
      - .env
    restart: unless-stopped